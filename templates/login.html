<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axolt — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #16161f; border: 1px solid #1e1e28; border-radius: 14px; padding: 36px 32px; width: 100%; max-width: 360px; }
  .logo { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 28px; letter-spacing: -0.3px; }
  label { font-size: 11px; color: #666; display: block; margin-bottom: 5px; }
  input { width: 100%; background: #1e1e28; border: 1px solid #2a2a38; border-radius: 7px; color: #ddd; font-size: 13px; padding: 10px 12px; font-family: inherit; margin-bottom: 14px; transition: border-color 0.15s; }
  input:focus { outline: none; border-color: #534AB7; }
  button { width: 100%; background: #534AB7; color: #fff; border: none; border-radius: 7px; padding: 11px; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 600; margin-top: 4px; transition: background 0.15s; }
  button:hover { background: #6257cc; }
  .error { font-size: 12px; color: #E24B4A; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Axolt</div>
  <form method="POST">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <label>USERNAME</label>
    <input type="text" name="username" autocomplete="username" autofocus>
    <label>PASSWORD</label>
    <input type="password" name="password" autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
