<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axolt — Report an Issue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&family=Open+Sans:wght@400;600&family=Newsreader:ital@1&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #e0e0e0; font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #16161f; border: 1px solid #1e1e28; border-radius: 14px; padding: 36px 32px; width: 100%; max-width: 420px; }
  .logo { font-family: 'Newsreader', Georgia, serif; font-size: 28px; color: #fff; margin-bottom: 10px; letter-spacing: -0.3px; }
  .logo .x { font-style: italic; font-size: 0.75em; vertical-align: super; margin: 0 -0.02em; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 24px; line-height: 1.5; }
  label { font-size: 11px; color: #666; display: block; margin-bottom: 5px; font-family: 'Manrope', sans-serif; }
  textarea { width: 100%; background: #1e1e28; border: 1px solid #2a2a38; border-radius: 7px; color: #ddd; font-size: 13px; padding: 10px 12px; font-family: inherit; margin-bottom: 14px; resize: vertical; transition: border-color 0.15s; }
  textarea:focus { outline: none; border-color: #FF333D; }
  button { width: 100%; background: #FF333D; color: #fff; border: none; border-radius: 7px; padding: 11px; font-size: 13px; font-family: 'Manrope', sans-serif; cursor: pointer; font-weight: 700; margin-top: 4px; transition: background 0.15s; }
  button:hover { background: #ff525a; }
  .message { font-size: 12px; color: #7ec339; margin-bottom: 14px; line-height: 1.5; }
  .back-link { display: block; text-align: center; margin-top: 18px; font-size: 12px; color: #666; text-decoration: none; }
  .back-link:hover { color: #999; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">a<span class="x">x</span>olt</div>
  <div class="subtitle">Describe what's going wrong — this gets flagged in the admin's dashboard for follow-up.</div>
  {% if message %}
    <div class="message">{{ message }}</div>
  {% endif %}
  <form method="POST">
    <label>DESCRIPTION</label>
    <textarea name="description" rows="5" autofocus></textarea>
    <button type="submit">Submit Report</button>
  </form>
  <a class="back-link" href="/">&larr; Back to dashboard</a>
</div>
</body>
</html>
