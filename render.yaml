services:
  - type: web
    name: axolt-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: gunicorn app:app
    rootDir: dashboard
    envVars:
      - key: NOTION_TOKEN
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.playwright
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_ADDRESS
        sync: false
